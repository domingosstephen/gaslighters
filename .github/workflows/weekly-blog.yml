name: Weekly Blog Post

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 6 AM UTC
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install blog engine dependencies
        run: npm install -g tsx

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/blog-engine/run.ts

      - name: Commit and push new article
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog/ scripts/blog-engine/control.json scripts/blog-engine/published.json
          git diff --staged --quiet || git commit -m "blog: auto-generate weekly article"
          git push
